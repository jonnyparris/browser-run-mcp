<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Dark theme gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="proxyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="brGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#451a03;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="siteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="closeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#60a5fa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#34d399"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f87171"/>
    </marker>

    <!-- Box shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="900" height="600" fill="url(#grid)" rx="16"/>

  <!-- Title area -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">Browser Rendering MCP</text>
  <text x="450" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" font-weight="400">Agent-controllable browser sessions on Cloudflare's edge</text>

  <!-- === MAIN FLOW (center column) === -->
  
  <!-- Step 1: AI Agent -->
  <g filter="url(#shadow)">
    <rect x="300" y="100" width="300" height="80" rx="14" fill="url(#agentGrad)" stroke="#475569" stroke-width="1.5"/>
    <!-- Icon -->
    <rect x="325" y="118" width="44" height="44" rx="10" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <text x="347" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">🤖</text>
    <text x="385" y="142" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f1f5f9">AI Agent / MCP Client</text>
    <text x="385" y="162" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Claude, OpenCode, Cursor, etc.</text>
  </g>

  <!-- Arrow: Agent → Proxy -->
  <line x1="450" y1="180" x2="450" y2="210" stroke="#60a5fa" stroke-width="2" opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: MCP Proxy (highlighted - the hero) -->
  <g filter="url(#shadow)">
    <rect x="280" y="210" width="340" height="100" rx="14" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="2.5"/>
    <!-- Glow effect around border -->
    <rect x="280" y="210" width="340" height="100" rx="14" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Icon -->
    <rect x="305" y="228" width="44" height="44" rx="10" fill="#1e40af" stroke="#60a5fa" stroke-width="1"/>
    <text x="327" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">⚡</text>
    <text x="365" y="252" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#bfdbfe">browser-rendering-mcp</text>
    <text x="365" y="272" font-family="system-ui, sans-serif" font-size="12" fill="#93c5fd">Code-mode proxy • Raw CDP • ~1k tokens</text>
    <text x="365" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa">Session persists • Short keep_alive (30s)</text>
  </g>

  <!-- Arrow: Proxy → BR -->
  <line x1="450" y1="310" x2="450" y2="340" stroke="#fbbf24" stroke-width="2" opacity="0.6" marker-end="url(#arrowAmber)"/>

  <!-- Step 3: Cloudflare Browser Rendering -->
  <g filter="url(#shadow)">
    <rect x="300" y="340" width="300" height="80" rx="14" fill="url(#brGrad)" stroke="#d97706" stroke-width="1.5"/>
    <!-- Icon -->
    <rect x="325" y="358" width="44" height="44" rx="10" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
    <text x="347" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">🌐</text>
    <text x="385" y="382" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fef3c7">Cloudflare Browser Rendering</text>
    <text x="385" y="402" font-family="system-ui, sans-serif" font-size="12" fill="#fbbf24">CDP endpoint • Managed browser on the edge</text>
  </g>

  <!-- Arrow: BR → Site -->
  <line x1="450" y1="420" x2="450" y2="450" stroke="#34d399" stroke-width="2" opacity="0.6" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Target Website -->
  <g filter="url(#shadow)">
    <rect x="300" y="450" width="300" height="80" rx="14" fill="url(#siteGrad)" stroke="#059669" stroke-width="1.5"/>
    <!-- Icon -->
    <rect x="325" y="468" width="44" height="44" rx="10" fill="#065f46" stroke="#34d399" stroke-width="1"/>
    <text x="347" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22">🎯</text>
    <text x="385" y="492" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#d1fae5">Target Website</text>
    <text x="385" y="512" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7">Any URL • Scraping • Screenshots • Automation</text>
  </g>

  <!-- === ANIMATED DATA PACKETS === -->
  <!-- Blue packet: Agent → Proxy -->
  <circle r="5" fill="#60a5fa" filter="url(#glowBlue)">
    <animate attributeName="cy" values="180;210" dur="1.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  
  <!-- Amber packet: Proxy → BR -->
  <circle r="5" fill="#fbbf24" filter="url(#glowAmber)">
    <animate attributeName="cy" values="310;340" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  
  <!-- Green packet: BR → Site -->
  <circle r="5" fill="#34d399" filter="url(#glowGreen)">
    <animate attributeName="cy" values="420;450" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- === CLOSE FLOW (the killer feature) === -->
  <g>
    <!-- Red arrow: Proxy → BR (Browser.close) -->
    <line x1="620" y1="260" x2="620" y2="380" stroke="#f87171" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#arrowRed)" opacity="0.9"/>
    
    <!-- Pulsing close packet -->
    <circle cx="620" r="6" fill="#ef4444" filter="url(#glowRed)">
      <animate attributeName="cy" values="260;380" dur="2.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>

    <!-- Close label badge -->
    <rect x="635" y="310" width="130" height="32" rx="8" fill="#7f1d1d" stroke="#f87171" stroke-width="1.5" opacity="0.95">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="700" y="331" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">browser.close()</text>
    
    <!-- Feature tag -->
    <rect x="635" y="350" width="130" height="22" rx="6" fill="#450a0a" stroke="#7f1d1d" stroke-width="1"/>
    <text x="700" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f87171" font-weight="600">Immediate teardown</text>
  </g>

  <!-- === SIDE PANEL: Comparison === -->
  <g>
    <!-- Panel background -->
    <rect x="40" y="210" width="210" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.8"/>
    
    <!-- Header -->
    <text x="145" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8">vs chrome-devtools-mcp</text>
    
    <!-- Divider -->
    <line x1="55" y1="245" x2="235" y2="245" stroke="#334155" stroke-width="1"/>
    
    <!-- chrome-devtools-mcp (old way) -->
    <text x="55" y="268" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f87171">chrome-devtools-mcp</text>
    <text x="55" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• 29 tools (~7k tokens)</text>
    <text x="55" y="302" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• No explicit close</text>
    <text x="55" y="319" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• 10 min idle timeout</text>
    
    <!-- Divider -->
    <line x1="55" y1="332" x2="235" y2="332" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
    
    <!-- This proxy (new way) -->
    <text x="55" y="355" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399">browser-rendering-mcp</text>
    <text x="55" y="372" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0">• 2 tools (~1k tokens)</text>
    <text x="55" y="389" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0">• Explicit browser.close()</text>
    <text x="55" y="406" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0">• 30 sec idle timeout</text>
  </g>

  <!-- === BOTTOM METRICS BAR === -->
  <g>
    <rect x="300" y="555" width="300" height="36" rx="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    
    <text x="350" y="577" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">
      <tspan fill="#60a5fa" font-weight="700">Raw CDP</tspan>
      <tspan> • </tspan>
      <tspan fill="#fbbf24" font-weight="700">~85% fewer tokens</tspan>
      <tspan> • </tspan>
      <tspan fill="#34d399" font-weight="700">Agent-controlled</tspan>
    </text>
  </g>
</svg>
