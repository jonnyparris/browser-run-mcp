<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="siteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-close" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="#ffffff" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Browser Rendering MCP</text>
  <text x="400" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">Agent-controllable browser sessions on Cloudflare's edge</text>

  <rect x="260" y="80" width="280" height="64" rx="10" fill="url(#agentGrad)" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#334155">AI Agent / MCP Client</text>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Claude, OpenCode, Cursor, etc.</text>

  <rect x="260" y="180" width="280" height="80" rx="10" fill="url(#proxyGrad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e40af">browser-rendering-mcp</text>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6">Code-mode proxy • Raw CDP • 1 tool (~1k tokens)</text>
  <text x="400" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Session persists across calls • Short keep_alive (30s)</text>

  <rect x="260" y="290" width="280" height="64" rx="10" fill="url(#brGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#92400e">Cloudflare Browser Rendering</text>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#b45309">CDP endpoint • Managed browser on the edge</text>

  <rect x="260" y="390" width="280" height="64" rx="10" fill="url(#siteGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#166534">Target Website</text>
  <text x="400" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">Any URL • Scraping • Screenshots • Automation</text>

  <line x1="400" y1="144" x2="400" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="260" x2="400" y2="290" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="354" x2="400" y2="390" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <circle cx="400" r="4" fill="#3b82f6" filter="url(#glow)">
    <animate attributeName="cy" values="144;180" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="400" r="4" fill="#f59e0b" filter="url(#glow)">
    <animate attributeName="cy" values="260;290" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="400" r="4" fill="#22c55e" filter="url(#glow)">
    <animate attributeName="cy" values="354;390" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="1;1;0" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <line x1="540" y1="220" x2="540" y2="322" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead-close)"/>
  <circle cx="540" r="5" fill="#ef4444" filter="url(#glow)">
    <animate attributeName="cy" values="220;322" dur="2s" repeatCount="indefinite" begin="1.2s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <rect x="548" y="265" width="112" height="24" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="604" y="281" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#dc2626">browser.close()</text>

  <rect x="40" y="190" width="180" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="212" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#475569">vs chrome-devtools-mcp</text>
  <text x="130" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">29 tools (~7k tokens)</text>
  <text x="130" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">No explicit close</text>

  <rect x="40" y="275" width="180" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="130" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">This proxy</text>
  <text x="130" y="317" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d">1 tool (~1k tokens)</text>
  <text x="130" y="331" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d">Explicit browser.close()</text>
</svg>
